# settings.ini
# category = <Name>  weist eine Einstellung einer Kategorie zu.
# Gleiche Kategorie-Namen landen auf derselben Seite in der Sidebar.

# ── Allgemein (general.lua) ───────────────────────────────────────────────────

[gaps_out]
category     = Allgemein
label        = Äußere Ränder
description  = Abstand zwischen Fenstern und Bildschirmrand
min          = 0
max          = 40
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = gaps_out
format       = lua

[gaps_in]
category     = Allgemein
label        = Innere Abstände
description  = Abstand zwischen benachbarten Fenstern
min          = 0
max          = 20
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = gaps_in
format       = lua

[border_size]
category     = Allgemein
label        = Rahmenbreite
description  = Dicke des Fensterrahmens in Pixeln
min          = 0
max          = 8
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = border_size
format       = lua

[rounding]
category     = Allgemein
label        = Eckenrundung
description  = Radius der abgerundeten Fensterecken
min          = 0
max          = 20
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = rounding
format       = lua

