# settings.ini – Vollständiges Beispiel
#
# ── Feldtypen ────────────────────────────────────────────────────────────────
#   type = slider      Schieberegler (min/max/step)
#   type = dropdown    Auswahlmenü (options = a, b, c)
#   type = multisetting     Mehrfeld-Eintrag (fields = JSON)
#
# ── Block-Auswahl ────────────────────────────────────────────────────────────
#   index_field = output          Feld das den Block identifiziert
#   index_value = DP-1            Gezielter Block (leer = alle auto-einlesen)
#   parent_key  = col             Elternblock für verschachtelte Keys
#
# ── Neuer Eintrag ────────────────────────────────────────────────────────────
#   new_template = <lua>          Lua-Template, {key} wird ersetzt
#   append_file  = /pfad/datei    Datei an die angehängt wird
#
# ── Formate ──────────────────────────────────────────────────────────────────
#   format = lua          Zahl ersetzen, Rest der Zeile bleibt
#   format = lua_string   String in Anführungszeichen ersetzen


# ══════════════════════════════════════════════════════════════════════════════
# ALLGEMEIN (general.lua)
# ══════════════════════════════════════════════════════════════════════════════

[gaps_out]
category     = Allgemein
label        = Äußere Ränder
description  = Abstand zwischen Fenstern und Bildschirmrand
type         = slider
min          = 0
max          = 40
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = gaps_out
format       = lua

[gaps_in]
category     = Allgemein
label        = Innere Abstände
description  = Abstand zwischen benachbarten Fenstern
type         = slider
min          = 0
max          = 20
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = gaps_in
format       = lua

[border_size]
category     = Allgemein
label        = Rahmenbreite
type         = slider
min          = 0
max          = 8
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = border_size
format       = lua

[angle]
category     = Allgemein
label        = Verlaufswinkel Rahmen
description  = Winkel des Farbverlaufs für aktiven Fensterrahmen
type         = slider
min          = 0
max          = 360
step         = 15
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = angle
parent_key   = col
format       = lua


# ══════════════════════════════════════════════════════════════════════════════
# INPUT (general.lua → input-Block)
# ══════════════════════════════════════════════════════════════════════════════

[sensitivity]
category     = Input
label        = Mausempfindlichkeit
type         = slider
min          = -10
max          = 10
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = sensitivity
parent_key   = input
format       = lua

[accel_profile]
category     = Input
label        = Beschleunigungsprofil
type         = dropdown
options      = flat, adaptive, custom
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = accel_profile
parent_key   = input
format       = lua_string

[follow_mouse]
category     = Input
label        = Fokus folgt Maus
description  = 0=aus  1=Fokus folgt  2=nur bei Klick
type         = slider
min          = 0
max          = 2
step         = 1
config_file  = /home/schnubby/.config/hypr/general.lua
config_key   = follow_mouse
parent_key   = input
format       = lua


# ══════════════════════════════════════════════════════════════════════════════
# MONITORE (monitors.lua)
# Gezielt per index_value: jeder Monitor bekommt eigene Einträge
# ══════════════════════════════════════════════════════════════════════════════

[monitor_dp1_mode]
category     = Monitore
label        = Auflösung & Frequenz
type         = dropdown
options      = 1920x1080@144, 1920x1080@60, 1280x720@60
config_file  = /home/schnubby/.config/hypr/monitors.lua
config_key   = mode
index_field  = output
index_value  = DP-1
format       = lua_string

[monitor_dp2_mode]
category     = Monitore
label        = Auflösung & Frequenz
type         = dropdown
options      = 1920x1200@60, 1920x1080@60, 1280x1024@60
config_file  = /home/schnubby/.config/hypr/monitors.lua
config_key   = mode
index_field  = output
index_value  = DP-2
format       = lua_string


# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS (keybindings.lua)
# index_field ohne index_value → alle Vorkommen von "description" auto-einlesen
# type = multisetting → Mehrfeld-Eintrag
# fields = JSON-Array mit den editierbaren Feldern pro Eintrag
# ══════════════════════════════════════════════════════════════════════════════

[keybinds_view]
category     = Keybindings
label        = Keybind bearbeiten
description  = Alle Keybinds mit description-Feld
type         = multisetting
config_file  = /home/schnubby/.config/hypr/keybindings.lua
config_key   = description
index_field  = description
index_value  =
format       = lua_string
# Editierbare Felder pro Keybind (JSON):
# key      = Lua-Key in dem Block
# label    = Anzeigename
# type     = text | dropdown
# options  = nur bei dropdown
fields       = [
    {"key": "description", "label": "Beschreibung",  "type": "text"},
    {"key": "modifier",    "label": "Modifier",       "type": "dropdown", "options": ["mainMod", "CTRL", "ALT", "SHIFT", "SUPER"]},
    {"key": "key",         "label": "Taste",          "type": "text"},
    {"key": "command",     "label": "Befehl",         "type": "dropdown", "options": ["hl.dsp.exec_cmd", "hl.dsp.focus", "hl.dsp.move_to_workspace", "hl.dsp.toggle_floating"]},
    {"key": "argument",    "label": "Argument",       "type": "text"}
  ]

# Neuer Keybind anlegen:
# {key} wird durch den eingegebenen Wert ersetzt
[keybinds_new]
category     = Keybindings
label        = Neuer Keybind
type         = multisetting
config_file  = /home/schnubby/.config/hypr/keybindings.lua
append_file  = /home/schnubby/.config/hypr/keybindings.lua
new_template = hl.bind({use_mainmod_prefix}{modifier_suffix}"{key}", {command}("{argument}"), { description = "{description}" })
fields       = [
    {"key": "description", "label": "Beschreibung",      "type": "text"},
    {"key": "use_mainmod", "label": "mainMod verwenden", "type": "dropdown", "options": ["yes", "no"]},
    {"key": "modifier",    "label": "Zusatz-Modifier",   "type": "dropdown", "options": ["none", "CTRL", "ALT", "SHIFT", "SUPER"]},
    {"key": "key",         "label": "Taste",             "type": "text"},
    {"key": "command",     "label": "Befehl",            "type": "dropdown", "options": ["hl.dsp.exec_cmd", "hl.dsp.focus", "hl.dsp.move_to_workspace", "hl.dsp.toggle_floating"]},
    {"key": "argument",    "label": "Argument",          "type": "text"}
  ]


# ══════════════════════════════════════════════════════════════════════════════
# WINDOW RULES (windowrules.lua)
# index_field = name, auto alle Rules einlesen
# ══════════════════════════════════════════════════════════════════════════════

[windowrules_view]
category     = Window Rules
label        = Window Rule
type         = multisetting
config_file  = /home/schnubby/.config/hypr/windowrules.lua
config_key   = name
index_field  = name
index_value  =
format       = lua_string
fields       = [
    {"key": "name",       "label": "Name",           "type": "text"},
    {"key": "class",      "label": "Klasse (Regex)", "type": "text"},
    {"key": "title",      "label": "Titel (Regex)",  "type": "text", "optional": true},
    {"key": "workspace",  "label": "Workspace",      "type": "text", "optional": true},
    {"key": "float",      "label": "Float",          "type": "dropdown", "options": ["", "true", "false"], "optional_if": ""},
    {"key": "center",     "label": "Zentriert",      "type": "dropdown", "options": ["", "true", "false"], "optional_if": ""},
    {"key": "fullscreen", "label": "Fullscreen",     "type": "dropdown", "options": ["", "true", "false"], "optional_if": ""}
  ]

[windowrules_new]
category     = Window Rules
label        = Neue Window Rule
type         = multisetting
config_file  = /home/schnubby/.config/hypr/windowrules.lua
append_file  = /home/schnubby/.config/hypr/windowrules.lua
new_template = __windowrule__
fields       = [
    {"key": "name",       "label": "Name",           "type": "text"},
    {"key": "class",      "label": "Klasse (Regex)", "type": "text"},
    {"key": "title",      "label": "Titel (Regex)",  "type": "text", "optional": true},
    {"key": "workspace",  "label": "Workspace",      "type": "text", "optional": true},
    {"key": "float",      "label": "Float",          "type": "dropdown", "options": ["", "true", "false"], "optional_if": ""},
    {"key": "center",     "label": "Zentriert",      "type": "dropdown", "options": ["", "true", "false"], "optional_if": ""},
    {"key": "fullscreen", "label": "Fullscreen",     "type": "dropdown", "options": ["", "true", "false"], "optional_if": ""}
  ]